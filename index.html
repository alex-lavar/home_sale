<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Our Home Sale</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink:       #1c1208;
  --cream:     #faf6ee;
  --warm:      #f5ede0;
  --border:    rgba(28,18,8,0.1);
  --muted:     #8a7060;
  --accent:    #c4622d;
  --accent-lt: #f2ddd0;
  --sage:      #6b7c5e;
  --shadow-sm: 0 2px 12px rgba(28,18,8,0.07);
  --shadow-lg: 0 16px 48px rgba(28,18,8,0.13);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
}

/* Grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

/* ── HEADER ── */
header {
  padding: 72px 32px 48px;
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 24px;
  border-bottom: 1px solid var(--border);
}

.header-left {}

.eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.8rem, 6vw, 5rem);
  font-weight: 400;
  line-height: 1.05;
  color: var(--ink);
}

h1 em {
  font-style: italic;
  color: var(--muted);
}

.header-right {
  text-align: right;
  padding-bottom: 8px;
}

.item-count {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
}

.item-count strong {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem;
  font-weight: 400;
  color: var(--ink);
  line-height: 1;
}

/* ── FILTERS ── */
.filter-bar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 32px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-right: 4px;
}

.filter-btn {
  padding: 7px 16px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.18s ease;
  white-space: nowrap;
}

.filter-btn:hover { border-color: var(--ink); color: var(--ink); }

.filter-btn.active {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--cream);
}

/* ── GRID ── */
.grid-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 8px 32px 96px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px;
}

/* ── CARDS ── */
.card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  animation: rise 0.45s ease both;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}

.card.is-sold { opacity: 0.6; }
.card.is-sold:hover { transform: none; box-shadow: var(--shadow-sm); }

@keyframes rise {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card:nth-child(1)  { animation-delay: 0.03s }
.card:nth-child(2)  { animation-delay: 0.06s }
.card:nth-child(3)  { animation-delay: 0.09s }
.card:nth-child(4)  { animation-delay: 0.12s }
.card:nth-child(5)  { animation-delay: 0.15s }
.card:nth-child(6)  { animation-delay: 0.18s }
.card:nth-child(7)  { animation-delay: 0.21s }
.card:nth-child(8)  { animation-delay: 0.24s }
.card:nth-child(9)  { animation-delay: 0.27s }
.card:nth-child(10) { animation-delay: 0.30s }

/* Image */
.card-img {
  position: relative;
  padding-top: 68%;
  background: var(--warm);
  overflow: hidden;
}

.card-img img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.card:hover .card-img img { transform: scale(1.05); }

.no-img {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  opacity: 0.25;
}

.sold-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: var(--ink);
  color: var(--cream);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 5px 11px;
  border-radius: 100px;
}

.cat-badge {
  position: absolute;
  bottom: 10px;
  left: 10px;
  background: rgba(250,246,238,0.92);
  color: var(--muted);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 100px;
  backdrop-filter: blur(6px);
}

/* Body */
.card-body {
  padding: 18px 20px 20px;
}

.card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.35rem;
  font-weight: 600;
  line-height: 1.25;
  margin-bottom: 6px;
}

.card-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.55;
  margin-bottom: 16px;
  min-height: 36px;
}

.card-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-weight: 600;
  color: var(--accent);
  line-height: 1;
}

.price.struck {
  color: var(--muted);
  text-decoration: line-through;
  font-size: 1.3rem;
}

.condition {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}

.cond-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--sage);
  flex-shrink: 0;
}

.cond-dot.used { background: var(--muted); }
.cond-dot.fair { background: var(--accent); }

/* ── STATES ── */
.state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 24px;
}

.state-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }

.state h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 400;
  margin-bottom: 8px;
}

.state p { font-size: 14px; color: var(--muted); }

.spinner {
  width: 32px; height: 32px;
  border: 2.5px solid var(--accent-lt);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--border);
  padding: 20px 32px;
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.06em;
}

@media (max-width: 640px) {
  header { grid-template-columns: 1fr; padding: 48px 20px 32px; }
  .header-right { text-align: left; }
  .filter-bar, .grid-wrap { padding-left: 20px; padding-right: 20px; }
  .grid { grid-template-columns: 1fr 1fr; gap: 14px; }
}

@media (max-width: 420px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <p class="eyebrow">Everything must go</p>
    <h1>Good things,<br/><em>new homes.</em></h1>
  </div>
  <div class="header-right">
    <div class="item-count">
      <strong id="countNum">—</strong>
      items available
    </div>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">Filter</span>
  <button class="filter-btn active" data-filter="all">All</button>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid">
    <div class="state">
      <div class="spinner"></div>
      <p>Loading listings…</p>
    </div>
  </div>
</div>

<footer>Prices firm unless noted &nbsp;·&nbsp; Reach out directly to arrange pickup</footer>

<script>
const EMOJI = {
  'Furniture':'🪑','Electronics':'📺','Kitchen':'🍳','Lighting':'💡',
  'Decor':'🪴','Clothing':'👕','Books':'📚','Tools':'🔧',
  'Appliances':'🏠','Outdoor':'🌿','Sports':'⚽','Other':'📦'
};

function condDot(c) {
  const s = (c||'').toLowerCase();
  if (s === 'fair') return 'fair';
  if (s === 'used') return 'used';
  return '';
}

let allItems = [];

function renderCards(items) {
  const grid = document.getElementById('grid');
  const available = items.filter(i => !i.sold).length;
  document.getElementById('countNum').textContent = available;

  if (!items.length) {
    grid.innerHTML = `<div class="state">
      <div class="state-icon">🏡</div>
      <h2>Nothing here yet</h2>
      <p>Check back soon.</p>
    </div>`;
    return;
  }

  grid.innerHTML = items.map((item, idx) => `
    <div class="card ${item.sold ? 'is-sold' : ''}" style="animation-delay:${idx * 0.04}s">
      <div class="card-img">
        ${item.photo
          ? `<img src="${item.photo}" alt="${item.name}" loading="lazy"/>`
          : `<div class="no-img">${EMOJI[item.category] || '📦'}</div>`}
        ${item.sold ? `<span class="sold-badge">Sold</span>` : ''}
        ${item.category ? `<span class="cat-badge">${item.category}</span>` : ''}
      </div>
      <div class="card-body">
        <div class="card-name">${item.name}</div>
        <div class="card-desc">${item.description || ''}</div>
        <div class="card-foot">
          <span class="price ${item.sold ? 'struck' : ''}">$${Number(item.price).toLocaleString()}</span>
          ${item.condition ? `<span class="condition"><span class="cond-dot ${condDot(item.condition)}"></span>${item.condition}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function buildFilters(items) {
  const bar = document.querySelector('.filter-bar');
  const cats = [...new Set(items.map(i => i.category).filter(Boolean))].sort();
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = cat;
    btn.textContent = cat;
    bar.appendChild(btn);
  });

  bar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    renderCards(f === 'all' ? allItems : allItems.filter(i => i.category === f));
  });
}

async function load() {
  try {
    const res = await fetch('items.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allItems = await res.json();
    buildFilters(allItems);
    renderCards(allItems);
  } catch (err) {
    document.getElementById('grid').innerHTML = `<div class="state">
      <div class="state-icon">⚠️</div>
      <h2>Couldn't load listings</h2>
      <p>${err.message}</p>
    </div>`;
  }
}

load();
</script>
</body>
</html>
